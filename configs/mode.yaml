# Deterministic mode selection — no chicken-and-egg architect probe.
# See src/luxe/mode_select.py:select_mode for the algorithm.

# Goal-keyword pre-classifier — checked first; deterministic substring match.
# If a swarm keyword matches, mode is swarm; if a single keyword matches, mode
# is single; otherwise fall through to the byte-size threshold.
swarm_keywords:
  - implement
  - refactor
  - rewrite
  - audit
  - migrate
  - harden
  - rearchitect
  - "add support"
  - build
  - create
  - convert
  - "upgrade dependencies"
  - port
  - introduce

single_keywords:
  - review
  - summarize
  - explain
  - describe
  - report
  - "what does"
  - "fix typo"
  - rename
  - document

# Source-byte fallback. NOT file count — file count is a bad proxy because one
# 3000-line file in a 49-file repo can blow the context window. ~125k tokens at
# ~4 bytes per token of source code; well under Qwen2.5-32B's 32k effective ctx.
byte_threshold: 500000

# Source files counted toward the threshold. Generated dirs and non-source
# extensions are excluded.
source_extensions:
  - .py
  - .ts
  - .tsx
  - .js
  - .jsx
  - .rs
  - .go
  - .java
  - .cpp
  - .cc
  - .h
  - .hpp
  - .rb
  - .php
  - .kt
  - .swift
  - .cs

# Directories never walked when computing source bytes (regenerated artefacts,
# vendor checkouts, virtualenvs).
exclude_dirs:
  - node_modules
  - dist
  - build
  - target
  - .venv
  - venv
  - __pycache__
  - .git
  - .next
  - .nuxt
  - .pytest_cache
  - .ruff_cache
  - .mypy_cache
