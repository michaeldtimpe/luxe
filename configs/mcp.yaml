# MCP — Model Context Protocol — client + server config.
#
# Default ships with NO client servers configured. Add servers under
# `client.servers` to opt in. The server-side block governs `luxe serve`
# (Phase 6) and is documented here for reference.
#
# Each client server has its own per-call timeout and per-session call cap;
# the global circuit breaker trips after `consecutive_failures` failed calls
# from one server.

client:
  servers: []
  # Example (commented):
  # - name: github
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-github"]
  #   env:
  #     GITHUB_TOKEN: "${GITHUB_TOKEN}"
  #   timeout_s: 30
  #   enabled_for: [maintain, review]
  #   max_calls_per_session: 50
  # - name: filesystem
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/safe/path"]
  #   timeout_s: 30
  #   enabled_for: [maintain]
  #   max_calls_per_session: 50

  circuit_breaker:
    consecutive_failures: 3
    hard_cap_calls: 200

# Server side (luxe serve) — Phase 6 will consume this.
server:
  read_only_tools:
    - luxe_review
    - luxe_summarize
    - luxe_explain
  mutation_tools:
    - luxe_maintain
  rate_limits:
    luxe_maintain: "1/min"
    luxe_review: "6/min"
    luxe_summarize: "6/min"
    luxe_explain: "6/min"
