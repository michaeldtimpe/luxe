# LiteLLM proxy: Claude Code (Anthropic /v1/messages) → mlx-lm (OpenAI /v1/chat/completions).
#
# Managed by the launchd agent at daily_driver/launchd/com.luxebox.litellm.plist,
# which pins the LiteLLM version via `uvx --from 'litellm[proxy]>=1.83,!=1.82.7,!=1.82.8'`
# so the known-bad 1.82.7 / 1.82.8 releases can never be picked.
#
# Known limitations (all noted in the plan's "Known limitations" section):
# - Prompt caching headers → stripped by `drop_params: true` (qwen can't honor them).
# - Extended thinking blocks → qwen-coder doesn't emit them; those requests degrade to no-op.
# - Deeply nested tool-arg schemas may round-trip imperfectly.
#
# Manual start:
#   uvx --from 'litellm[proxy]>=1.83' litellm --config daily_driver/litellm_bridge.yml --port 4000

model_list:
  # Primary entry — what Claude Code sends when ANTHROPIC_CUSTOM_MODEL_OPTION=qwen-coder-local.
  - model_name: qwen-coder-local
    litellm_params:
      model: openai/qwen2.5-coder-32b
      api_base: http://127.0.0.1:8088/v1
      api_key: none-needed

  # Aliases — if Claude Code ever forces one of Anthropic's known model names
  # (e.g. through a per-project settings override or subagent default), route
  # the request to the same local backend rather than 404ing.
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: openai/qwen2.5-coder-32b
      api_base: http://127.0.0.1:8088/v1
      api_key: none-needed
  - model_name: claude-opus-4-7
    litellm_params:
      model: openai/qwen2.5-coder-32b
      api_base: http://127.0.0.1:8088/v1
      api_key: none-needed
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: openai/qwen2.5-coder-32b
      api_base: http://127.0.0.1:8088/v1
      api_key: none-needed
  - model_name: claude-3-5-sonnet-20241022
    litellm_params:
      model: openai/qwen2.5-coder-32b
      api_base: http://127.0.0.1:8088/v1
      api_key: none-needed

general_settings:
  master_key: sk-local-luxebox      # must match ANTHROPIC_AUTH_TOKEN in ~/.claude/settings.json
  disable_spend_logs: true

litellm_settings:
  drop_params: true                 # strip anthropic-beta, cache headers, thinking params
  set_verbose: false
