# luxe v1.0 acceptance fixtures.
#
# Schema (one entry per fixture):
#
#   - id: <unique-string>
#     repo_url: <git URL or local path>  # local paths are cloned offline
#                                        # OR repo_path: <local checkout, used in-place>
#     base_sha: <40-char hex>        # deterministic starting point
#     goal: "<one sentence>"
#     task_type: bugfix | implement | document | manage
#     expected_outcome:
#       kind: tests_pass | regex_present | regex_absent | manual_review
#       command: "<shell>"           # for tests_pass
#       pattern: "<regex>"           # for regex_*
#       min_matches: <int>           # OPTIONAL (regex_present); default 1.
#                                    # Pattern must hit in ≥N distinct ADDED
#                                    # lines. Use ≥2 to defeat single-edit
#                                    # gaming on multi-call-site tasks.
#       min_added_lines: <int>       # OPTIONAL (regex_present); default 0.
#                                    # Diff must add ≥N total lines across
#                                    # changed files. Use 5-30 to defeat
#                                    # rename-only or one-line "edits" that
#                                    # technically match the regex.
#       criteria: "<text>"           # for manual_review
#     required_env: [GITHUB_TOKEN]   # optional; missing → skipped
#     notes: "<freeform>"            # documentation, not graded
#
# v1.0 release gate: ≥8 of ≥10 fixtures pass (≥4/5 score each).

fixtures:

  # --- 1) lpe-rope-calc — single-file Python utility (20 KB) ---------------
  - id: lpe-rope-calc-document-typing
    repo_url: /Users/michaeltimpe/.luxe/fixture-cache/lpe-rope-calc
    base_sha: 5c6b51f80e76f80c49a789029414f5152a5edbd7
    goal: "Add a module docstring at the top of pe_scan.py and add type hints to every top-level function signature, preserving existing behaviour"
    task_type: document
    expected_outcome:
      kind: regex_present
      pattern: "def \\w+\\([^)]*: ?(?:str|int|float|bool|Path|list|dict|Optional|None)"
      min_matches: 4          # task says "every top-level function"; pe_scan.py
                              # has ~6 top-level fns. ≥4 catches partial work.
      min_added_lines: 6      # docstring + several signature edits
    notes: |
      Easy-win document task. Single-file repo; mono mode handles in <2 min once warm.

  - id: lpe-rope-calc-implement-strict-flag
    repo_url: /Users/michaeltimpe/.luxe/fixture-cache/lpe-rope-calc
    base_sha: 5c6b51f80e76f80c49a789029414f5152a5edbd7
    goal: "Add a `--strict` CLI flag to pe_scan.py: when set, the script exits with non-zero status if any scanned GGUF file has missing or unreadable header metadata. Keep the default behaviour (exit 0 on any error) when --strict is not passed"
    task_type: implement
    expected_outcome:
      kind: regex_present
      pattern: "(?:add_argument|--strict|args\\.strict)"
      min_matches: 2          # arg registration + usage site
      min_added_lines: 6
    notes: |
      Implement task on a small Python utility. Tests argparse navigation +
      flag-conditioned exit code. Outcome regex is broad (any of three
      argparse idioms) so a working implementation will pass regardless of
      style; min_matches=2 forces both registration and usage.

  # --- 2) the-game — small JS movie randomizer (74 KB) ---------------------
  - id: the-game-implement-shuffle-shortcut
    repo_url: /Users/michaeltimpe/.luxe/fixture-cache/the-game
    base_sha: 514d22d95dbbc55b8ad73d158d311f507f8a7b51
    goal: "Add a keyboard shortcut: pressing the 'r' key should re-randomize the current movie pick. Bind the listener once on page load; do not interfere with text inputs"
    task_type: implement
