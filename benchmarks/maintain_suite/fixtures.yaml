      kind: regex_present
      pattern: "addEventListener.*['\"](key(down|up|press))['\"]"
      min_added_lines: 5
    notes: |
      Small JS feature add. Tests luxe's ability to find the existing
      randomization handler and wire a keyboard input.

  - id: the-game-document-architecture
    repo_url: /Users/michaeltimpe/.luxe/fixture-cache/the-game
    base_sha: 514d22d95dbbc55b8ad73d158d311f507f8a7b51
    goal: "Update README.md to add a 'How it works' section that describes the movie randomization algorithm in src/App.jsx (where the list is sourced and how the next pick is chosen). Reference at least one file path and the function or hook responsible"
    task_type: document
    expected_outcome:
      kind: regex_present
      pattern: "(?i)#+\\s*how\\s*it\\s*works"
      min_added_lines: 8      # forces real prose, not just a header rename
    notes: |
      Document task complementing the existing implement fixture. The model
      must read App.jsx and explain its logic, not just add a header line.

