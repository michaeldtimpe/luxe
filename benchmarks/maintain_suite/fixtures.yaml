  - id: neon-rain-document-modules
    repo_url: /Users/michaeltimpe/.luxe/fixture-cache/neon-rain
    base_sha: ef953cc85bead2f09147b99c2a1a2cb2f7d813d0
    goal: "Create ARCHITECTURE.md at the repo root listing each src/ subdirectory (actions, ai, data, debug, input, phases, render, state, ui) and describing in 1-2 sentences what each one is responsible for. Mention the EventBus or its equivalent if present"
    task_type: document
    expected_outcome:
      kind: regex_present
