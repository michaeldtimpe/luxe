      model has to navigate, not read one file end-to-end.

  # --- 4) isomer — Flask compliance tracker (~110 KB) ----------------------
  - id: isomer-document-quickstart
    repo_url: /Users/michaeltimpe/.luxe/fixture-cache/isomer
    base_sha: 33da2bc14869bc252901cb199ba73b2fa776e33f
    goal: "Update README.md to add a 'Quickstart' section showing how to run the app locally with docker-compose and how to access the dashboard. Reference docker-compose.yml and the default port from app.py. Preserve any existing setup steps already documented; do not strip the ISOMER_SECRET / .env setup"
    task_type: document
