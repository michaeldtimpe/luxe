# Mode × model test matrix for the maintain_suite comparison harness.
#
# Each variant is one (mode, model) cell. The suite iterates fixtures × variants;
# state/result/diagnostics are namespaced under output/<variant_id>/<fixture_id>/
# so cells don't collide.
#
# Modes:
#   mono   — single large model drives the whole task end-to-end (RunMode.SINGLE)
#   swarm  — sequential specialist pipeline (architect → workers → validator → synth)
#   micro  — same pipeline but workers dispatch to the microloop draft/verify runner
#
# For mono: model_id replaces the `monolith` model in configs/single_64gb.yaml.
# For swarm/micro: model_id replaces worker_read/worker_code/worker_analyze and
# the microloop drafter/coder; architect/validator/synthesizer/verifier stay
# on the canonical baselines so the comparison is apples-to-apples.

variants:
  # --- mono (single model handles everything) ---
  - {mode: mono, model_label: qwen-coder-0.5b, model_id: Qwen2.5-Coder-0.5B-Instruct-4bit}
  - {mode: mono, model_label: qwen-coder-1.5b, model_id: Qwen2.5-Coder-1.5B-Instruct-4bit}
  - {mode: mono, model_label: qwen-coder-14b,  model_id: Qwen2.5-Coder-14B-Instruct-4bit}

  # --- swarm (model fills the worker tier) ---
  - {mode: swarm, model_label: qwen-coder-0.5b, model_id: Qwen2.5-Coder-0.5B-Instruct-4bit}
  - {mode: swarm, model_label: qwen-coder-1.5b, model_id: Qwen2.5-Coder-1.5B-Instruct-4bit}
  - {mode: swarm, model_label: qwen-coder-14b,  model_id: Qwen2.5-Coder-14B-Instruct-4bit}

  # --- micro (model fills the drafter/coder roles) ---
  - {mode: micro, model_label: qwen-coder-0.5b, model_id: Qwen2.5-Coder-0.5B-Instruct-4bit}
  - {mode: micro, model_label: qwen-coder-1.5b, model_id: Qwen2.5-Coder-1.5B-Instruct-4bit}
  - {mode: micro, model_label: qwen-coder-14b,  model_id: Qwen2.5-Coder-14B-Instruct-4bit}
